site_name: bohra
site_url: https://mduphl.github.io/bohra/

nav:
  - About: index.md
  - Installation: installation.md
  - Cookbook:
      - How do I?: cookbook/how_to.md
      - Troubleshooting: cookbook/faq.md
  - Usage:
      - Quick guide: usage/quickguide.md
      - Inputs: usage/inputs.md
      - Understanding the report: usage/report.md
      - Quality: usage/quality.md
      - Migration bohra2 to bohra3: usage/migration.md
  - Pipelines:
      - Pipelines overview: pipelines/overview.md
      - Basic pipeline: pipelines/basic.md
      - Assembly pipeline: pipelines/assemble.md
      - Comparative pipeline: pipelines/comparative.md
      - Full pipeline: pipelines/full.md
      - TB pipeline: pipelines/tb.md
  
  - Contributing: contributing.md
  - License: license.md
theme:
  name: material
  logo: images/logo.svg
  palette:
      primary: blue grey
  icon:
      repo: fontawesome/brands/github-alt
  
features:
    - content.code.copy
    - content.code.select

repo_url: https://github.com/MDU-PHL/bohra
repo_name: MDU-PHL/bohra
extra:
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/MDU-PHL/bohra

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format